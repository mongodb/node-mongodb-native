description: "causal consistency write commands include afterClusterTime"

schemaVersion: "1.3"

runOnRequirements:
  - topologies: [replicaset, sharded, load-balanced]

createEntities:
  - client:
      id: &client0 client0
      useMultipleMongoses: false
      uriOptions:
        retryWrites: false
      observeEvents: [commandStartedEvent]
  - database:
      id: &database0 database0
      client: *client0
      databaseName: &databaseName causal-consistency-tests
  - collection:
      id: &collection0 collection0
      database: *database0
      collectionName: &collectionName test
  - session:
      id: &session0 session0
      client: *client0
      sessionOptions:
        causalConsistency: true

initialData:
  - collectionName: *collectionName
    databaseName: *databaseName
    documents:
      - { _id: 1, x: 11 }
      - { _id: 2, x: 22 }
      - { _id: 3, x: 33 }

# In a causally consistent session, once an operationTime has been established by a prior
# operation, subsequent write commands MUST include readConcern.afterClusterTime so the
# server can apply the write causally after the previously-observed data.

tests:
  - description: "insertOne includes afterClusterTime in causally consistent session"
    operations:
      - &find
        name: find
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: 1 }
        expectResult: [{ _id: 1, x: 11 }]
      - name: insertOne
        object: *collection0
        arguments:
          session: *session0
          document: { _id: 4 }
        expectResult:
          $$unsetOrMatches: { insertedId: { $$unsetOrMatches: 4 } }
    expectEvents:
      - client: *client0
        events:
          - &findEvent
            commandStartedEvent:
              commandName: find
              command:
                find: *collectionName
                readConcern: { $$exists: false }
                lsid: { $$sessionLsid: *session0 }
          - commandStartedEvent:
              commandName: insert
              command:
                insert: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "insertMany includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: insertMany
        object: *collection0
        arguments:
          session: *session0
          documents:
            - { _id: 4 }
            - { _id: 5 }
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: insert
              command:
                insert: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "updateOne includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: updateOne
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: 1 }
          update: { $set: { x: 100 } }
        expectResult:
          matchedCount: 1
          modifiedCount: 1
          upsertedCount: 0
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: update
              command:
                update: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "updateMany includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: updateMany
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: { $gt: 0 } }
          update: { $set: { updated: true } }
        expectResult:
          matchedCount: 3
          modifiedCount: 3
          upsertedCount: 0
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: update
              command:
                update: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "replaceOne includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: replaceOne
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: 1 }
          replacement: { x: 100 }
        expectResult:
          matchedCount: 1
          modifiedCount: 1
          upsertedCount: 0
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: update
              command:
                update: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "deleteOne includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: deleteOne
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: 1 }
        expectResult:
          deletedCount: 1
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: delete
              command:
                delete: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "deleteMany includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: deleteMany
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: { $gt: 0 } }
        expectResult:
          deletedCount: 3
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: delete
              command:
                delete: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "findOneAndUpdate includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: findOneAndUpdate
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: 1 }
          update: { $set: { x: 100 } }
        expectResult: { _id: 1, x: 11 }
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: findAndModify
              command:
                findAndModify: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "findOneAndDelete includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: findOneAndDelete
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: 1 }
        expectResult: { _id: 1, x: 11 }
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: findAndModify
              command:
                findAndModify: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "findOneAndReplace includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: findOneAndReplace
        object: *collection0
        arguments:
          session: *session0
          filter: { _id: 1 }
          replacement: { x: 100 }
        expectResult: { _id: 1, x: 11 }
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: findAndModify
              command:
                findAndModify: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "bulkWrite includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: bulkWrite
        object: *collection0
        arguments:
          session: *session0
          requests:
            - insertOne:
                document: { _id: 4 }
            - updateOne:
                filter: { _id: 2 }
                update: { $set: { x: 100 } }
            - deleteOne:
                filter: { _id: 3 }
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: insert
              command:
                insert: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }
          - commandStartedEvent:
              commandName: update
              command:
                update: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }
          - commandStartedEvent:
              commandName: delete
              command:
                delete: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "create includes afterClusterTime in causally consistent session"
    operations:
      - *find
      # Drop the collection first to make sure there's no name conflict during
      # createCollection.
      - name: dropCollection
        object: *database0
        arguments:
          session: *session0
          collection: &newCollectionName causal-consistency-createCollection-test
      - name: createCollection
        object: *database0
        arguments:
          session: *session0
          collection: *newCollectionName
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: drop
              command:
                drop: *newCollectionName
                lsid: { $$sessionLsid: *session0 }
          - commandStartedEvent:
              commandName: create
              command:
                create: *newCollectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "createIndexes includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: createIndex
        object: *collection0
        arguments:
          session: *session0
          keys: { x: 1 }
          name: x_1
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: createIndexes
              command:
                createIndexes: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "drop includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: dropCollection
        object: *database0
        arguments:
          session: *session0
          collection: *collectionName
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: drop
              command:
                drop: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "dropDatabase includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: dropDatabase
        object: *client0
        arguments:
          session: *session0
          database: causal-consistency-dropDatabase-test
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: dropDatabase
              command:
                dropDatabase: 1
                $db: causal-consistency-dropDatabase-test
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  - description: "dropIndexes includes afterClusterTime in causally consistent session"
    operations:
      - *find
      - name: dropIndexes
        object: *collection0
        arguments:
          session: *session0
    expectEvents:
      - client: *client0
        events:
          - *findEvent
          - commandStartedEvent:
              commandName: dropIndexes
              command:
                dropIndexes: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern:
                  afterClusterTime: { $$exists: true }
                  level: { $$exists: false }

  # Covers the same condition as Causal Consistency prose test #2, but for a write operation.
  - description: "first write command in a causally consistent session does not include afterClusterTime"
    operations:
      - name: insertOne
        object: *collection0
        arguments:
          session: *session0
          document: { _id: 4 }
        expectResult:
          $$unsetOrMatches: { insertedId: { $$unsetOrMatches: 4 } }
    expectEvents:
      - client: *client0
        events:
          - commandStartedEvent:
              commandName: insert
              command:
                insert: *collectionName
                lsid: { $$sessionLsid: *session0 }
                readConcern: { $$exists: false }
