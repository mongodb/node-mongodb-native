description: "estimatedDocumentCount-comment"

schemaVersion: "1.0"

createEntities:
  - client:
      id: &client0 client0
      observeEvents: [ commandStartedEvent ]
  - database:
      id: &database0 database0
      client: *client0
      databaseName: &database0Name edc-comment-tests
  - collection:
      id: &collection0 collection0
      database: *database0
      collectionName: &collection0Name coll0

initialData:
  - collectionName: *collection0Name
    databaseName: *database0Name
    documents:
      - { _id: 1, x: 11 }
      - { _id: 2, x: 22 }
      - { _id: 3, x: 33 }

tests:
  - description: "estimatedDocumentCount with document comment"
    runOnRequirements:
      # https://jira.mongodb.org/browse/SERVER-63315
      # Server supports count with comment of any type for comment starting from 4.4.14.
      - minServerVersion: "4.4.14"
    operations:
      - name: estimatedDocumentCount
        object: *collection0
        arguments:
          comment: &documentComment { key: "value"}
        expectResult: 3
    expectEvents:
      - client: *client0
        events:
          - commandStartedEvent:
              command:
                count: *collection0Name
                comment: *documentComment
              commandName: count
              databaseName: *database0Name

  - description: "estimatedDocumentCount with string comment"
    runOnRequirements:
      - minServerVersion: "4.4.0"
    operations:
      - name: estimatedDocumentCount
        object: *collection0
        arguments:
          comment: &stringComment "comment"
        expectResult: 3
    expectEvents:
      - client: *client0
        events:
          - commandStartedEvent:
              command:
                count: *collection0Name
                comment: *stringComment
              commandName: count
              databaseName: *database0Name
